{% extends "base.html" %}
{% block content %}

<h3>Search Student</h3>

<form method="POST">

    <input type="text" name="keyword" placeholder="Enter name" class="form-control" required>

    <br>

    <button class="btn btn-primary">Search</button>

</form>

<hr>

<table class="table">

    <tr>
        <th>Name</th>
        <th>Branch</th>
        <th>CGPA</th>
    </tr>

    {% for s in students %}

    <tr>
        <td>{{ s.name }}</td>
        <td>{{ s.branch }}</td>
        <td>{{ s.cgpa }}</td>
    </tr>

    {% endfor %}

</table>

{% endblock %}
