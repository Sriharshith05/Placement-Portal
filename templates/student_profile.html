{% extends "base.html" %}

{% block content %}

<h3 class="mb-3">Edit Profile</h3>

<form method="POST">

    <input class="form-control mb-3" name="name" value="{{ student.name }}" required>

    <input class="form-control mb-3" name="branch" value="{{ student.branch }}" required>

    <input class="form-control mb-3" name="cgpa" type="number" step="0.01" min="0" max="10" value="{{ student.cgpa }}"
        required>

    <button class="btn btn-success">
        Update Profile
    </button>

</form>

{% endblock %}
