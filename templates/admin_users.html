{% extends "base.html" %}

{% block content %}

<h3 class="mb-3">All Users</h3>

<table class="table table-hover align-middle shadow-sm">
    <tr>
        <th>ID</th>
        <th>Email</th>
        <th>Role</th>
        <th>Status</th>
        <th>Action</th>
    </tr>

    {% for u in users %}

    <tr>
        <td>{{ u.id }}</td>
        <td>{{ u.email }}</td>
        <td>{{ u.role }}</td>

        <td>
            {% if u.active %}
            Active
            {% else %}
            Inactive
            {% endif %}
        </td>

        <td>
            {% if u.active %}
            <a href="{{ url_for('toggle_user', user_id=u.id) }}" class="btn btn-danger btn-sm">
                Deactivate
            </a>
            {% else %}
            <a href="{{ url_for('toggle_user', user_id=u.id) }}" class="btn btn-success btn-sm">
                Activate
            </a>
            {% endif %}
        </td>

    </tr>

    {% endfor %}

</table>

{% endblock %}
