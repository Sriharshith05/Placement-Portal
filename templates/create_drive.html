{% extends "base.html" %}

{% block content %}

<div class="card mt-4">
    <div class="card-body">

        <h3 class="text-success mb-3">Create Placement Drive</h3>

        <form method="post">

            <input class="form-control mb-3" name="title" placeholder="Job Title" required>

            <textarea class="form-control mb-3" name="description" placeholder="Job Description" required></textarea>

            <input class="form-control mb-3" type="date" name="deadline" required>
            <input class="form-control mb-3" type="number" step="0.01" min="0" max="10" name="min_cgpa"
                placeholder="Minimum CGPA (e.g. 7.0)" required>

            <button class="btn btn-success">
                Create Drive
            </button>

        </form>

    </div>
</div>

{% endblock %}
